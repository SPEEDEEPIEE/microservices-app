events {
    worker_connections 1024;
}

http {
    upstream user_service {
        server user-service:5000;
    }
    
    upstream order_service {
        server order-service:3000;
    }
    
    server {
        listen 80;
        
        # Прокси для user-service
        location /api/users/ {
            proxy_pass http://user_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Убираем префикс /api/users
            rewrite ^/api/users/(.*) /$1 break;
        }
        
        # Обработка /api/users без слеша
        location /api/users {
            return 301 $scheme://$host/api/users/;
        }
        
        # Прокси для order-service
        location /api/orders/ {
            proxy_pass http://order_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Убираем префикс /api/orders
            rewrite ^/api/orders/(.*) /$1 break;
        }
        
        # Обработка /api/orders без слеша
        location /api/orders {
            return 301 $scheme://$host/api/orders/;
        }
        
        # Health check
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
        
        # Корневой путь
        location / {
            return 200 'Microservices API Gateway\nAvailable endpoints:\n- /api/users\n- /api/orders\n- /health\n';
            add_header Content-Type text/plain;
        }
    }
}
